events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    resolver 127.0.0.11 ipv6=off valid=30s;

    # Rate limiting: 10 requests per second across the board
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_status 429;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8000;
        server_name localhost;

        # Custom JSON errors
        error_page 401 = @error401;
        error_page 429 = @error429;
        error_page 502 503 504 = @error503;

        location @error401 {
            default_type application/json;
            return 401 '{"detail": "Not authenticated"}';
        }

        location @error429 {
            default_type application/json;
            return 429 '{"detail": "Too many requests"}';
        }

        location @error503 {
            default_type application/json;
            return 503 '{"detail": "Service temporarily unavailable"}';
        }

        # Internal route for JWT validation
        location = /_validate_jwt {
            internal;
            proxy_pass http://auth-service:8080/api/v1/auth/validate-token;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # Auth Service Routes
        location /api/v1/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth-service:8080/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/people/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_validate_jwt;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $workspace_id $upstream_http_x_workspace_id;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-Workspace-Id $workspace_id;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;
            set $people_upstream people-service:8082;
            proxy_pass http://$people_upstream/api/v1/people/;
        }

        location /api/v1/projects/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_validate_jwt;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $workspace_id $upstream_http_x_workspace_id;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-Workspace-Id $workspace_id;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;
            set $projects_upstream projects-service:8083;
            proxy_pass http://$projects_upstream/api/v1/projects/;
        }

        location /api/v1/info-portal/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_validate_jwt;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $workspace_id $upstream_http_x_workspace_id;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-Workspace-Id $workspace_id;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;
            set $info_portal_upstream info-portal-service:8084;
            proxy_pass http://$info_portal_upstream/api/v1/info-portal/;
        }

        location /api/v1/messenger/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_validate_jwt;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $workspace_id $upstream_http_x_workspace_id;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-Workspace-Id $workspace_id;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;
            set $messenger_upstream messenger-service:8085;
            proxy_pass http://$messenger_upstream/api/v1/messenger/;
        }

        location = /ws/messenger {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request /_validate_jwt;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $workspace_id $upstream_http_x_workspace_id;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-Workspace-Id $workspace_id;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_http_version 1.1;
            proxy_intercept_errors on;
            set $messenger_ws_upstream messenger-service:8085;
            proxy_pass http://$messenger_ws_upstream/ws/messenger;
        }

        # Health endpoints
        location = /health/auth {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://auth-service:8080/health;
        }

        location = /health/telegram {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://telegram-integration-service:8081/health;
        }

        location = /health/people {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_intercept_errors on;
            set $people_health_upstream people-service:8082;
            proxy_pass http://$people_health_upstream/health;
        }

        location = /health/projects {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_intercept_errors on;
            set $projects_health_upstream projects-service:8083;
            proxy_pass http://$projects_health_upstream/health;
        }

        location = /health/info-portal {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_intercept_errors on;
            set $info_portal_health_upstream info-portal-service:8084;
            proxy_pass http://$info_portal_health_upstream/health;
        }

        location = /health/messenger {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_intercept_errors on;
            set $messenger_health_upstream messenger-service:8085;
            proxy_pass http://$messenger_health_upstream/health;
        }
    }
}
