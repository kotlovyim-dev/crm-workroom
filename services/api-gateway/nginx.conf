events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting: 10 requests per second across the board
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 8000;
        server_name localhost;

        # Custom JSON errors
        error_page 401 = @error401;
        error_page 429 = @error429;

        location @error401 {
            default_type application/json;
            return 401 '{"detail": "Not authenticated"}';
        }

        location @error429 {
            default_type application/json;
            return 429 '{"detail": "Too many requests"}';
        }

        # Internal route for JWT validation
        location = /_validate_jwt {
            internal;
            proxy_pass http://auth-service:8080/api/v1/auth/validate-token;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # Auth Service Routes
        location /api/v1/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth-service:8080/api/v1/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Template for protected downstream microservices
        location ~ ^/api/v1/(?!auth)(.*)$ {
            limit_req zone=api_limit burst=20 nodelay;
            
            # Authenticate via auth-service
            auth_request /_validate_jwt;
            auth_request_set $user_id $upstream_http_x_user_id;
            proxy_set_header X-User-Id $user_id;

            return 501 '{"detail": "Microservice Not Implemented Yet"}';
            default_type application/json;
        }

        # Health endpoints
        location /health/ {
            limit_req zone=api_limit burst=10 nodelay;
            
            location /health/auth {
                proxy_pass http://auth-service:8080/health;
            }
            location /health/telegram {
                proxy_pass http://telegram-integration-service:8081/health;
            }
        }
    }
}
