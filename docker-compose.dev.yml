services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules
      - web-next:/app/.next
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"

  api-gateway:
    image: nginx:alpine
    ports:
      - "8000:8000"
    volumes:
      - ./services/api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - people-service

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile.dev
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload"
    volumes:
      - ./services/auth-service:/app
    env_file:
      - ./services/auth-service/.env
    environment:
      APP_ENV: development
      TELEGRAM_SERVICE_URL: http://telegram-integration-service:8081
    depends_on:
      - telegram-integration-service

  people-service:
    build:
      context: ./services/people-service
      dockerfile: Dockerfile.dev
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8082 --reload"
    volumes:
      - ./services/people-service:/app
    env_file:
      - ./services/auth-service/.env
    environment:
      APP_ENV: development
      FRONTEND_URL: http://localhost:3000

  telegram-integration-service:
    build:
      context: ./services/telegram-integration-service
      dockerfile: Dockerfile.dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8081 --reload
    volumes:
      - ./services/telegram-integration-service:/app
    environment:
      APP_ENV: development
      TELEGRAM_DELIVERY_MODE: polling
      REDIS_URL: redis://telegram-integration-redis:6379
    extra_hosts:
      - "api.telegram.org:149.154.166.110"
    depends_on:
      - telegram-integration-redis

  telegram-integration-redis:
    image: redis:7-alpine
    container_name: telegram-integration-redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - telegram-redis-data:/data

volumes:
  web-node-modules:
  web-next:
  telegram-redis-data:
