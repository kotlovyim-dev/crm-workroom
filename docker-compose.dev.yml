services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules
      - web-next:/app/.next
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"

  api-gateway:
    image: nginx:alpine
    ports:
      - "8000:8000"
    volumes:
      - ./services/api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile.dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    volumes:
      - ./services/auth-service:/app
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://crm:crm@auth-postgres:5432/crm_auth
      TELEGRAM_SERVICE_URL: http://telegram-integration-service:8081

    depends_on:
      - auth-postgres

  telegram-integration-service:
    build:
      context: ./services/telegram-integration-service
      dockerfile: Dockerfile.dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8081 --reload
    volumes:
      - ./services/telegram-integration-service:/app
    environment:
      APP_ENV: development
      TELEGRAM_DELIVERY_MODE: polling
      REDIS_URL: redis://telegram-integration-redis:6379
    depends_on:
      - telegram-integration-redis

  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_DB: crm_auth
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U crm -d crm_auth" ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data

  telegram-integration-redis:
    image: redis:7-alpine
    container_name: telegram-integration-redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - telegram-redis-data:/data

volumes:
  web-node-modules:
  web-next:
  auth-postgres-data:
  telegram-redis-data:
